name: Bunnify CI

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, reopened, synchronize]
    branches-ignore:
      - '**/graphite-base/**'

jobs:
  guard:
    name: Guard
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          # Skip merge-queue staging branches — the merge queue validates the
          # integrated state itself; CI there duplicates work.
          if [[ "$HEAD_REF" == gtmq_merge_* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Skip when the PR is already merged — Graphite pushes a restack
          # commit to the next branch after a merge lands, which would otherwise
          # trigger a redundant CI run on an already-validated diff.
          pr_number="$PR_NUMBER"
          if [[ -n "$pr_number" ]]; then
            state=$(gh pr view "$pr_number" --repo "$REPOSITORY" --json state -q .state)
            if [[ "$state" == "MERGED" ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  lint-python:
    name: Python lint & format checks
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Set up Python 3.14
      run: uv python install 3.14

    - name: Install dependencies (including dev)
      run: uv sync --all-groups

    - name: Check import sorting (isort)
      run: uv run isort --check-only --diff .

    - name: Check formatting (black)
      run: uv run black --check .

    - name: Type check (pyright)
      run: uv run pyright --warnings

  lint-shell:
    name: Shell script linting
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install shellcheck
      run: sudo apt-get update && sudo apt-get install -y shellcheck

    - name: Lint bash scripts with shellcheck
      run: |
        shellcheck bunnify-server
        shellcheck test_integration
        if [ -d scripts ]; then find scripts -type f | xargs shellcheck; fi

  test:
    name: Tests & validations
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Set up Python 3.14
      run: uv python install 3.14

    - name: Install dependencies
      run: uv sync --all-groups

    - name: Run Django checks
      run: uv run python manage.py check

    - name: Run migrations
      run: uv run python manage.py migrate

    - name: Validate example bookmark file
      run: |
        cp bunnify.json.example /tmp/test_bookmarks.json
        uv run python manage.py load_bookmarks --file /tmp/test_bookmarks.json

    - name: Validate bunnify-server script
      run: ./bunnify-server --help

    - name: Run unit tests
      run: ./test_bunnify

    - name: Run integration script (timeout protected)
      run: |
        chmod +x ./test_integration
        ./test_integration
